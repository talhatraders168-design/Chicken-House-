<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken House Ultra Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:linear-gradient(90deg,#d32f2f,#b71c1c);
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
padding:10px;
border-bottom:1px solid #eee;
}

button{
padding:8px 10px;
border:none;
background:#d32f2f;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#b71c1c;
}

.cart{
background:#222;
color:white;
padding:15px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:1px solid #ccc;
}

.qtyBtn{
background:#444;
padding:5px 10px;
}
</style>
</head>

<body>

<header>
<h1>🐔 Chicken House ULTRA PRO</h1>
<p>Restaurant Level Online Ordering System</p>
</header>

<div class="container">

<!-- MENU -->
<div class="card">
<h3>🍗 Menu</h3>

<div class="item">
<span>Grilled Chicken - $5</span>
<button onclick="add('Grilled Chicken',5)">Add</button>
</div>

<div class="item">
<span>Fried Chicken - $4</span>
<button onclick="add('Fried Chicken',4)">Add</button>
</div>

<div class="item">
<span>Chicken Burger - $3</span>
<button onclick="add('Chicken Burger',3)">Add</button>
</div>

</div>

<!-- CHECKOUT -->
<div class="card">
<h3>Checkout</h3>
<input id="name" placeholder="Your Name">
<textarea id="address" placeholder="Your Address"></textarea>
<input id="phone" placeholder="Phone Number">
</div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cart"></div>

<p>Subtotal: $<span id="subtotal">0</span></p>
<p>Delivery: $2</p>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="order()">📱 Place Order</button>
</div>

</div>

<script>

let cart = [];

function add(name, price){
cart.push({name, price});
render();
}

function render(){

let html = "";
let subtotal = 0;

cart.forEach((item,i)=>{
subtotal += item.price;
html += `
<div style="margin:5px 0">
${item.name} - $${item.price}
<button class="qtyBtn" onclick="removeItem(${i})">Remove</button>
</div>
`;
});

document.getElementById("cart").innerHTML = html;

let delivery = cart.length > 0 ? 2 : 0;
let total = subtotal + delivery;

document.getElementById("subtotal").innerText = subtotal;
document.getElementById("total").innerText = total;
}

function removeItem(index){
cart.splice(index,1);
render();
}

function order(){

let shopNumber = "88017XXXXXXX"; // 👉 তোমার নাম্বার

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let phone = document.getElementById("phone").value;

if(!name || !address || !phone){
alert("Please fill all fields");
return;
}

if(cart.length === 0){
alert("Cart empty");
return;
}

let subtotal = 0;
let msgItems = "";

cart.forEach(i=>{
subtotal += i.price;
msgItems += i.name + " - $" + i.price + "\n";
});

let delivery = 2;
let total = subtotal + delivery;

let msg =
"🐔 *CHICKEN HOUSE ULTRA PRO ORDER*\n\n" +
"Name: " + name + "\n" +
"Phone: " + phone + "\n" +
"Address: " + address + "\n\n" +
"Items:\n" + msgItems + "\n" +
"Subtotal: $" + subtotal + "\n" +
"Delivery: $" + delivery + "\n" +
"Total: $" + total + "\n\n" +
"Thank you ❤️";

let url = "https://wa.me/" + shopNumber + "?text=" + encodeURIComponent(msg);

window.open(url,"_blank");

}

</script>

</body>
</html>
